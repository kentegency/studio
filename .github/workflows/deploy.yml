name: Deploy to Vercel

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: Downloads/kentegency-studio/package-lock.json

      - name: Install
        run: npm install
        working-directory: Downloads/kentegency-studio

      - name: Build
        run: npm run build
        working-directory: Downloads/kentegency-studio
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Tag version
        run: |
          git config user.email "ci@kentegency.com"
          git config user.name "Kentegency CI"
          git tag -a "v$(date +'%Y%m%d%H%M')" -m "Auto-deploy $(date)"
          git push origin --tags
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
